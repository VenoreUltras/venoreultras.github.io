<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interaktywna Instrukcja Prasy Mimośrodowej</title>
    <!-- Google Fonts for modern technical look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <!-- Kontener na scenę Three.js -->
    <div id="three-canvas"></div>

    <!-- Phase 5: kontener etykiet 3D (CSS2DRenderer, z-index:8, pointer-events:none) -->
    <div id="label-overlay-container" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:8;"></div>

    <!-- Interfejs Użytkownika -->
    <div id="ui-layer">
      <div id="status-panel" class="status-panel glass-panel" role="region" aria-label="Status maszyny"></div>

      <header class="header">
        <h1>Prasa Mimośrodowa PM-300</h1>
        <p class="subtitle">Wizualizacja kinematyki układu korbowego</p>
      </header>

      <div class="control-panel glass-panel">
        <h2>Panel Sterowania</h2>

        <div class="control-group">
          <label>Status Maszyny</label>
          <div class="status-indicator">
            <span id="status-dot" class="dot stopped"></span>
            <span id="status-text">Zatrzymana</span>
          </div>
        </div>

        <div class="control-group">
          <label for="speed-slider">Prędkość obrotowa (RPM)</label>
          <div class="slider-wrapper">
            <input type="range" id="speed-slider" min="10" max="120" value="30" step="1">
            <span id="speed-value" class="mono">30</span>
          </div>
        </div>

        <div class="button-group">
          <button id="btn-toggle" class="btn primary">Start / Stop</button>
        </div>
      </div>

      <div class="info-panel glass-panel">
        <h2>Parametry Układu</h2>
        <ul class="params-list">
          <li><span>Skok suwaka (2r):</span> <span class="mono">1.6 m</span></li>
          <li><span>Długość korbowodu (l):</span> <span class="mono">4.0 m</span></li>
          <li><span>Aktualny kąt wału:</span> <span id="val-angle" class="mono">0.0°</span></li>
          <li><span>Wychylenie suwaka (y):</span> <span id="val-displacement" class="mono">0.00 m</span></li>
        </ul>
        <div class="equation-box">
          <code>y = r·cos(α) + √(l² - (r·sin(α))²)</code>
        </div>
      </div>

      <aside id="step-panel" class="step-panel glass-panel" role="region" aria-label="Procedura szkoleniowa"></aside>
    </div>

    <!-- Phase 6 Plan 06-07: session-overlay (results modal, z-index:250, hidden by default) -->
    <div id="session-overlay" class="session-overlay" role="dialog" aria-modal="false" aria-label="Podsumowanie sesji" style="display:none;"></div>

    <!-- Phase 6: replay drawer (EDU-04, z-index:200, hidden by default) -->
    <div id="replay-drawer" class="replay-drawer" aria-label="Replay sesji" role="region" style="display:none;"></div>

    <!-- Phase 5: kontener modali (HelpModal + ConfirmModal, z-index:300, pointer-events:none) -->
    <div id="modal-container" style="position:fixed;inset:0;z-index:300;pointer-events:none;"></div>

    <!-- Phase 15 (MENU-01): mount point dla StartMenuOverlay. Brak pointer-events:none — menu jest interaktywne.
         Styling (z-index:200, display toggle) w style.css; musi istnieć w DOM przed new StartMenuOverlay(). -->
    <div id="start-menu-container"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
